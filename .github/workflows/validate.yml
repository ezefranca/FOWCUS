name: Validate dataset

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Build and validate derived data
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip check

      - name: Compile scripts
        run: python -m py_compile scripts/build_dataset.py scripts/validate_dataset.py

      - name: Validate JSON metadata
        run: |
          python -m json.tool datapackage.json > /dev/null
          python -m json.tool codemeta.json > /dev/null
          python -m json.tool metadata/dataset_summary.json > /dev/null

      - name: Rebuild derived tables
        run: python scripts/build_dataset.py

      - name: Validate derived tables
        run: python scripts/validate_dataset.py

      - name: Ensure generated outputs are committed
        run: |
          git diff --exit-code -- \
            data/processed/csv \
            data/processed/parquet \
            metadata/dataset_summary.json
